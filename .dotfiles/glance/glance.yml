pages:
    - name: Home
      # Optionally, if you only have a single page you can hide the desktop navigation for a cleaner look
      # hide-desktop-navigation: true
      columns:
          - size: small
            widgets:
                - type: server-stats
                  servers:
                      - type: local
                        name: Homelab
                - type: custom-api
                  title: Immich stats
                  cache: 1d
                  url: http://10.0.0.99:2283/api/server/statistics
                  headers:
                      x-api-key: SrD2AobK2w5TeuH5xsaKduKkMHnmOoHq15FpoV9rQM
                      Accept: application/json
                  template: |
                      <div class="flex justify-between text-center">
                        <div>
                            <div class="color-highlight size-h3">{{ .JSON.Int "photos" | formatNumber }}</div>
                            <div class="size-h6">PHOTOS</div>
                        </div>
                        <div>
                            <div class="color-highlight size-h3">{{ .JSON.Int "videos" | formatNumber }}</div>
                            <div class="size-h6">VIDEOS</div>
                        </div>
                        <div>
                            <div class="color-highlight size-h3">{{ div (.JSON.Int "usage" | toFloat) 1073741824 | toInt | formatNumber }}GB</div>
                            <div class="size-h6">USAGE</div>
                        </div>
                      </div>
          - size: full
            widgets:
                - type: monitor
                  cache: 1m
                  title: Stuff
                  sites:
                      - title: DockGE
                        url: http://10.0.0.99:5001
                        icon: /assets/DockGE-logo.png
                      - title: Immich
                        url: http://10.0.0.99:2283
                        icon: /assets/immich-logo.png
                      - title: Copyparty
                        url: http://10.0.0.99:3923
                        icon: /assets/immich-logo.png
                      - title: Affine
                        url: http://10.0.0.99:3010
                        icon: /assets/immich-logo.png
                - type: custom-api
                  title: Astronomy Picture of the Day
                  cache: 1d
                  url: https://api.nasa.gov/planetary/apod?api_key=8z1dakeZnqJPX6NIfufPmaADHe6ZV47thwLGEZTo
                  headers:
                      Accept: application/json
                  template: |
                      {{- if eq (.JSON.String "media_type") "image" -}}
                        <div style="display:flex; justify-content:center; align-items:center; width:100%; height:100%;">
                          <img
                            src="{{ .JSON.String "url" }}"
                            alt="{{ .JSON.String "title" }}"
                            style="max-width:100%; height:auto; display:block; border-radius:4px;"
                          />
                        </div>
                      {{- else -}}
                        <p class="color-negative" style="text-align:center;">No image available today.</p>
                      {{- end }}

          - size: small
            widgets:
                - type: clock
                  hour-format: 24h
                - type: weather
                  units: metric
                  hour-format: 24h
                  location: Tel Aviv, Israel

