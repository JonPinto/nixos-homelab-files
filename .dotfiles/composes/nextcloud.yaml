version: "3.8"
services:
    db:
        image: mariadb:10.11
        restart: always
        command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
        volumes:
            - ./db:/var/lib/mysql
        environment:
            - MARIADB_ROOT_PASSWORD=2004
            - MARIADB_PASSWORD=2004
            - MARIADB_DATABASE=nextcloud
            - MARIADB_USER=jonpinto
    app:
        image: nextcloud:latest
        restart: always
        ports:
            - 8081:80
        volumes:
            - ./nextcloud:/var/www/html
        environment:
            - MYSQL_PASSWORD=2004
            - MYSQL_DATABASE=nextcloud
            - MYSQL_USER=jonpinto
            - MYSQL_HOST=db
networks: {}
